name: 2mod_25M
description: "2-module synthetic experiment, ~25M param MiniGPT"
seeds: [42, 137, 2026]
output_dir: results/synthetic
wandb_project: kalavai-paper

architecture:
  n_layers: 6
  d_model: 512
  n_heads: 8
  d_ff: 2048
  context_length: 256
  vocab_size: 512
  dropout: 0.0

alignment:
  freeze_layers: 2
  seed: 42

training:
  batch_size: 16
  learning_rate: 3e-4
  weight_decay: 0.1
  max_steps: 5000
  eval_interval: 500
  warmup_steps: 200
  gradient_clip: 1.0
  precision: fp32

fusion:
  method: moe
  router_steps: 500
  router_lr: 1e-3

data:
  mode: synthetic
  domains:
    - code
    - stories
  data_tokens: 2000000
