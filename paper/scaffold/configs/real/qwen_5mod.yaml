# 5-Module Cooperative Experiment (Table 2, Row 3 in paper)
# Tests whether fusion improvement compounds with more specialists

name: qwen_5mod
description: >
  5 domain specialists fused via MoE routing.
  Domains chosen for maximal divergence: code, math, science, legal, creative.
  Tests scaling from 2 modules to 5.

seeds: [42, 137, 2026]
output_dir: results/real
wandb_project: kalavu-paper

alignment:
  freeze_layers: 2
  seed: 42

training:
  batch_size: 4
  learning_rate: 2e-4
  weight_decay: 0.1
  max_steps: 500
  eval_interval: 100
  warmup_steps: 50
  gradient_clip: 1.0
  precision: bf16

fusion:
  method: moe
  router_steps: 500
  router_lr: 1e-3

data:
  mode: huggingface
  model_id: Qwen/Qwen2.5-1.5B
  domains: [code, math, science, legal, creative]
  dataset_ids:
    code: bigcode/starcoderdata
    math: open-web-math/open-web-math
    science: scientific_papers/arxiv
    legal: pile-of-law/pile-of-law
    creative: emozilla/pg19
  max_train_samples: 10000
  max_eval_samples: 500

eval:
  benchmarks: [humaneval, gsm8k, arc_challenge, sciq]
  eval_batch_size: 8
  num_fewshot: 0
