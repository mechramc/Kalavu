# BTX Baseline Comparison (Table 2 in paper)
# Compares KALAVU (frozen layers + MoE) against BTX (no frozen layers, averaged attention, MoE FFN)

name: qwen_btx_baseline
description: >
  Head-to-head: KALAVU vs BTX on same data.
  KALAVU: freeze first 2 layers, MoE-route all unfrozen layers.
  BTX: no freezing, average attention weights, MoE-route FFN layers only.
  This isolates the contribution of frozen layers to fusion quality.

seeds: [42, 137, 2026]
output_dir: results/real
wandb_project: kalavu-paper

alignment:
  freeze_layers: 0  # BTX doesn't freeze anything
  seed: 42

training:
  batch_size: 4
  learning_rate: 2e-4
  weight_decay: 0.1
  max_steps: 500
  eval_interval: 100
  warmup_steps: 50
  gradient_clip: 1.0
  precision: bf16

fusion:
  method: btx
  router_steps: 200
  router_lr: 1e-3
  btx_average_attention: true  # BTX averages attention, MoE-routes FFN

data:
  mode: huggingface
  model_id: Qwen/Qwen2.5-1.5B
  domains: [math, science]
  dataset_ids:
    math: open-web-math/open-web-math
    science: scientific_papers/arxiv
  max_train_samples: 10000
  max_eval_samples: 500

eval:
  benchmarks: [gsm8k, arc_challenge, sciq]
  eval_batch_size: 8
  num_fewshot: 0
